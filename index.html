<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Goku 3D Chuyển Động Đẹp - Three.js</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #000; }
        canvas { display: block; }
        #loading {
            position: absolute; top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            color: white; font-family: Arial, sans-serif; font-size: 20px;
        }
    </style>
</head>
<body>
    <div id="loading">Đang tải mô hình Goku 3D...</div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

        let scene, camera, renderer, mixer, clock;

        init();
        animate();

        function init() {
            // 1. Khởi tạo Cảnh (Scene)
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x101010); // Màu nền tối

            // 2. Khởi tạo Camera
            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.set(0, 1.5, 3); // Đặt camera nhìn từ trước tới

            // 3. Khởi tạo Renderer (Trình kết xuất)
            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(window.devicePixelRatio);
            renderer.outputColorSpace = THREE.SRGBColorSpace; // Giúp màu sắc đẹp hơn
            document.body.appendChild(renderer.domElement);

            // 4. Ánh sáng (Lighting) - Rất quan trọng để mô hình 3D đẹp
            const ambientLight = new THREE.AmbientLight(0xffxff, 1); // Ánh sáng môi trường
            scene.add(ambientLight);

            const directionalLight = new THREE.DirectionalLight(0xffffff, 2); // Ánh sáng định hướng
            directionalLight.position.set(5, 5, 5);
            scene.add(directionalLight);

            // 5. Điều khiển Camera (OrbitControls) - Cho phép xoay, thu phóng bằng chuột
            const controls = new OrbitControls(camera, renderer.domElement);
            controls.enableDamping = true; // Hiệu ứng làm mờ khi xoay

            // 6. Clock để quản lý thời gian hoạt ảnh
            clock = new THREE.Clock();

            // 7. Tải mô hình 3D (GLTFLoader)
            const loader = new GLTFLoader();
            // THAY ĐỔI ĐƯỜNG DẪN NÀY ĐẾN FILE GOKU CỦA BẠN
            loader.load('goku.glb', function (gltf) {
                const model = gltf.scene;
                scene.add(model);

                // Điều chỉnh kích thước và vị trí nếu cần
                model.scale.set(1, 1, 1); // Tỷ lệ 1:1
                model.position.set(0, 0, 0);

                // 8. Xử lý Hoạt ảnh (Animation)
                const animations = gltf.animations;
                if (animations && animations.length) {
                    mixer = new THREE.AnimationMixer(model);
                    // Chạy hoạt ảnh đầu tiên (thường là Idle hoặc Run)
                    const action = mixer.clipAction(animations[0]);
                    action.play();
                }

                // Ẩn dòng chữ loading
                document.getElementById('loading').style.display = 'none';

            }, function (xhr) {
                // Hiển thị tiến trình tải
                console.log((xhr.loaded / xhr.total * 100) + '% đã tải');
            }, function (error) {
                console.error('Lỗi khi tải mô hình:', error);
                document.getElementById('loading').innerText = 'Lỗi khi tải mô hình. Kiểm tra lại đường dẫn file!';
            });

            // Hỗ trợ resize cửa sổ
            window.addEventListener('resize', onWindowResize, false);
        }

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        function animate() {
            requestAnimationFrame(animate);

            // Cập nhật mixer hoạt ảnh
            if (mixer) {
                mixer.update(clock.getDelta());
            }

            // Cập nhật controls
            // controls.update(); // Nếu enableDamping = true

            renderer.render(scene, camera);
        }
    </script>
</body>
</html>
