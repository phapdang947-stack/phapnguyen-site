<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <title>PhapNguyen Site</title>
  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #f0f2f5;
    }

    /* Sidebar */
    .sidebar {
      width: 220px;
      height: 100vh;
      background: #1e1e2f;
      color: white;
      position: fixed;
      padding: 20px;
    }

    .sidebar h2 {
      color: #00d4ff;
    }

    .sidebar a {
      display: block;
      color: white;
      text-decoration: none;
      margin: 10px 0;
    }

    .sidebar a:hover {
      color: #00d4ff;
    }

    /* Main */
    .main {
      margin-left: 240px;
      padding: 20px;
    }

    .card {
      background: white;
      padding: 20px;
      border-radius: 10px;
      margin-bottom: 20px;
      box-shadow: 0 0 10px rgba(0,0,0,0.1);
    }

    /* Banner */
    .banner {
      background: linear-gradient(90deg, #00c6ff, #0072ff);
      color: white;
      padding: 20px;
      border-radius: 10px;
    }

    .banner button {
      margin-top: 10px;
      padding: 10px 15px;
      border: none;
      background: white;
      color: #0072ff;
      border-radius: 5px;
      cursor: pointer;
    }

    /* Popup */
    .popup {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.5);
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .popup-content {
      background: white;
      padding: 30px;
      border-radius: 10px;
      text-align: center;
      width: 300px;
    }

    .popup-content img {
      width: 80px;
    }

    .popup button {
      margin-top: 10px;
      padding: 10px;
      border: none;
      border-radius: 5px;
      cursor: pointer;
    }

    .btn-open {
      background: red;
      color: white;
    }

    .btn-close {
      background: gray;
      color: white;
    }
  </style>
</head>
<body>

<!-- Sidebar -->
<div class="sidebar">
  <h2>PhapNguyen</h2>
  <a href="#">Trang chủ</a>
  <a href="#">Hosting</a>
  <a href="#">Tên miền</a>
  <a href="#">Nạp tiền</a>
</div>

<!-- Main -->
<div class="main">

  <div class="banner">
    <h3>Thiết Kế Website pháp nguyễn</h3>
    <p>Chỉ từ 500K / Website</p>
    <button>Xem thêm</button>
  </div>

  <div class="card">
    <h3>Thông tin tài khoản</h3>
    <p>Tên: phapnguyen01</p>
    <p>Số dư: 196.000đ</p>
  </div>

  <div class="card">
    <h3>Khuyến mãi</h3>
    <p>Không có mã giảm giá</p>
  </div>

</div>

<!-- Popup -->
<div class="popup" id="popup">
  <div class="popup-content">
    <img src="https://cdn-icons-png.flaticon.com/512/869/869869.png">
    <h3>BAO LÌ XÌ MAY MẮN</h3>
    <p>Chúc bạn năm mới phát tài!</p>

    <button class="btn-open" onclick="alert('Bạn nhận 50K!')">MỞ NGAY</button>
    <button class="btn-close" onclick="closePopup()">Đóng</button>
  </div>
</div>

<script>
  function closePopup() {
    document.getElementById("popup").style.display = "none";
  }

  // Tự hiện popup khi vào web
  window.onload = function() {
    document.getElementById("popup").style.display = "flex";
  }
</script>

</body>
</html>
